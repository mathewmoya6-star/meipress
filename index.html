<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mei Press Group</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{font-family:'DM Sans',sans-serif;margin:0;background:#fdf9f0;color:#1a1a2e}
nav{background:#071a33;color:#fff;padding:14px 32px;display:flex;justify-content:space-between}
.logo{font-family:'Playfair Display',serif}
.hero{background:#071a33;color:#fff;text-align:center;padding:80px 20px}
.btn{background:#c9991f;color:#071a33;padding:12px 24px;border:none;cursor:pointer}
section{padding:50px 20px;max-width:900px;margin:auto}
input,select{width:100%;padding:10px;margin-top:5px;margin-bottom:15px}
.card{background:#fff;padding:20px;border-radius:8px;border:1px solid #eee}
</style>
</head>

<body>

<nav>
  <div class="logo">Mei Press Group</div>
</nav>

<div class="hero">
  <h1>Build Your Future With Us</h1>
  <p>Study abroad, driver placement & safety training</p>
</div>

<section>
  <h2>Apply Now</h2>

  <div class="card">
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone">
    <input id="email" placeholder="Email">
    <select id="service">
      <option>Study Abroad</option>
      <option>Driver Placement</option>
      <option>OSH Training</option>
    </select>

    <button class="btn" onclick="submitApp()">Submit</button>
    <p id="msg"></p>
  </div>
</section>

<section>
  <h2>M-Pesa Payment</h2>
  <div class="card">
    <p><strong>Paybill:</strong> 4095377</p>
    <input id="payphone" placeholder="Phone 2547XXXXXXXX">
    <input id="amount" placeholder="Amount">
    <button class="btn" onclick="pay()">Pay Now</button>
  </div>
</section>

<section>
  <h2>Chat</h2>
  <div class="card">
    <div id="chat"></div>
    <input id="chatInput" placeholder="Ask something..." onkeydown="if(event.key==='Enter')sendChat()">
  </div>
</section>

<script>

/* ✅ SUBMIT APPLICATION */
async function submitApp(){
  const res = await fetch('/api/applications',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:document.getElementById('name').value,
      phone:document.getElementById('phone').value,
      email:document.getElementById('email').value,
      service:document.getElementById('service').value
    })
  });

  document.getElementById('msg').innerText="Application submitted!";
}

/* ✅ M-PESA PAYMENT */
async function pay(){
  const res = await fetch('/api/mpesa/stk',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      phone:document.getElementById('payphone').value,
      amount:document.getElementById('amount').value
    })
  });

  alert("STK Push sent to phone");
}

/* ✅ CHATBOT (SECURE VIA BACKEND) */
let chatHistory=[];

async function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value;
  input.value='';

  document.getElementById('chat').innerHTML += "<p><b>You:</b> "+text+"</p>";

  chatHistory.push({role:'user',content:text});

  const res = await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:chatHistory})
  });

  const data = await res.json();
  const reply = data.content[0].text;

  chatHistory.push({role:'assistant',content:reply});

  document.getElementById('chat').innerHTML += "<p><b>Bot:</b> "+reply+"</p>";
}

</script>

</body>
</html>
